global:
  resolve_timeout: 5m

route:
  receiver: yuuki-warning
  group_by: ["service", "alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - service="kitan-telegram"
        - alertname="YuukiReplyAuthProbeFail"
      receiver: yuuki-pager
      continue: false
      group_wait: 15s
      repeat_interval: 30m
    - matchers:
        - service="kitan-telegram"
        - severity="critical"
      receiver: yuuki-pager
      continue: false
      group_wait: 30s
      repeat_interval: 1h
    - matchers:
        - service="kitan-telegram"
        - severity="warning"
      receiver: yuuki-warning
      continue: false
      group_wait: 1m
      repeat_interval: 3h

receivers:
  - name: yuuki-warning
    webhook_configs:
      - url: http://127.0.0.1:19093/alertmanager/warning
        send_resolved: true
  - name: yuuki-pager
    webhook_configs:
      - url: http://127.0.0.1:19093/alertmanager/pager
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - service="kitan-telegram"
      - severity="critical"
    target_matchers:
      - service="kitan-telegram"
      - severity="warning"
    equal: ["alertname"]
